<svg width="680" height="860" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif;background:#ffffff">

<rect x="250" y="24" width="180" height="40" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="49" text-anchor="middle" fill="#085041">POST /research</text>

<line x1="340" y1="64" x2="340" y2="88" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="230" y="88" width="220" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="113" text-anchor="middle" fill="#2c2c2a">Init session + validate</text>

<line x1="340" y1="128" x2="340" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="190" y="152" width="300" height="52" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="175" text-anchor="middle" fill="#26215c">Decompose query</text>
<text font-size="11" x="340" y="194" text-anchor="middle" fill="#534ab7">LLM decides: 1 sub-query or 2–N</text>

<line x1="340" y1="204" x2="340" y2="228" stroke="#534ab7" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="190" y="228" width="300" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="253" text-anchor="middle" fill="#2c2c2a">Expand to items  (1 item per sub-query)</text>

<line x1="340" y1="268" x2="340" y2="292" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="230" y="292" width="220" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="317" text-anchor="middle" fill="#2c2c2a">Loop over items</text>
<text font-size="10" x="340" y="286" text-anchor="middle" fill="#888780">splitInBatches</text>

<line x1="340" y1="332" x2="340" y2="356" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="60" y="356" width="560" height="148" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text font-size="11" x="340" y="374" text-anchor="middle" fill="#085041">per sub-query  (N iterations)</text>

<rect x="80" y="384" width="168" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="164" y="409" text-anchor="middle" fill="#2c2c2a">Capture loop state</text>

<line x1="248" y1="404" x2="274" y2="404" stroke="#534ab7" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="274" y="372" width="172" height="72" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="360" y="397" text-anchor="middle" fill="#26215c">AI Agent</text>
<text font-size="11" x="360" y="414" text-anchor="middle" fill="#534ab7">web search · wikipedia</text>
<text font-size="11" x="360" y="430" text-anchor="middle" fill="#534ab7">calculator</text>

<line x1="446" y1="404" x2="472" y2="404" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="472" y="384" width="128" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="536" y="409" text-anchor="middle" fill="#2c2c2a">Store episode</text>

<path d="M536 424 L536 472 L340 472 L340 504" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text font-size="10" x="454" y="465" text-anchor="middle" fill="#888780">loop back</text>
<text font-size="10" x="152" y="466" text-anchor="middle" fill="#888780">Merge Agent Output</text>
<text font-size="10" x="152" y="479" text-anchor="middle" fill="#888780">rejoins state + answer</text>

<rect x="190" y="504" width="300" height="52" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="527" text-anchor="middle" fill="#2c2c2a">Collect all episodes</text>
<text font-size="11" x="340" y="546" text-anchor="middle" fill="#5f5e5a">merge N answers → one item</text>

<line x1="340" y1="556" x2="340" y2="580" stroke="#534ab7" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="190" y="580" width="300" height="52" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="603" text-anchor="middle" fill="#26215c">Synthesize answer</text>
<text font-size="11" x="340" y="622" text-anchor="middle" fill="#534ab7">AI Agent (no tools)  ·  cites [Ep1]–[EpN]</text>

<line x1="340" y1="632" x2="340" y2="656" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="220" y="656" width="240" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="681" text-anchor="middle" fill="#2c2c2a">Format final response</text>

<line x1="340" y1="696" x2="340" y2="716" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="250" y="716" width="180" height="40" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="741" text-anchor="middle" fill="#085041">JSON response</text>

<rect x="16" y="356" width="36" height="52" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="34" y="376" text-anchor="middle" fill="#085041">L1</text>
<text font-size="10" x="34" y="392" text-anchor="middle" fill="#0f6e56">buf</text>
<text font-size="9" x="34" y="420" text-anchor="middle" fill="#0f6e56">window</text>

<rect x="628" y="356" width="36" height="52" rx="6" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="646" y="376" text-anchor="middle" fill="#26215c">L2</text>
<text font-size="10" x="646" y="392" text-anchor="middle" fill="#534ab7">eps</text>
<text font-size="9" x="646" y="420" text-anchor="middle" fill="#534ab7">store</text>

<rect x="628" y="504" width="36" height="52" rx="6" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text font-size="11" font-weight="500" x="646" y="524" text-anchor="middle" fill="#412402">L3</text>
<text font-size="10" x="646" y="540" text-anchor="middle" fill="#854f0b">sum</text>
<text font-size="9" x="646" y="568" text-anchor="middle" fill="#854f0b">≥6 eps</text>

<rect x="16" y="790" width="10" height="10" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text font-size="11" x="32" y="800" fill="#0f6e56">entry / exit</text>
<rect x="16" y="810" width="10" height="10" rx="2" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text font-size="11" x="32" y="820" fill="#534ab7">LLM call</text>
<rect x="16" y="830" width="10" height="10" rx="2" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text font-size="11" x="32" y="840" fill="#5f5e5a">processing</text>

<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

</svg>
